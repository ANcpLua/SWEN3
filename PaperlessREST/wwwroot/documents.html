<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Paperless - Documents</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="/index.html">Paperless</a>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="/index.html">Dashboard</a></li>
            <li class="nav-item active"><a class="nav-link" href="/documents.html">Documents</a></li>
            <li class="nav-item"><a class="nav-link" href="/upload.html">Upload</a></li>
        </ul>
    </div>
</nav>

<div class="container mt-4">
    <div id="alertContainer"></div>
    <h1 class="text-center">Documents</h1>
    <hr>

    <div class="row">
        <div class="col">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Document Name</th>
                    <th>Date Uploaded</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="documentsTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<footer class="footer bg-light text-center py-3">
    <div class="container">
        <span class="text-muted">Paperless - Your simple Document Management System</span>
    </div>
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const apiBaseUrl = '/api/documents'; // Changed to relative URL

    async function loadDocuments() {
        try {
            const response = await fetch(apiBaseUrl);
            if (!response.ok) throw new Error('Network response was not ok');

            const documents = await response.json();
            const tableBody = document.getElementById('documentsTableBody');
            tableBody.innerHTML = '';

            documents.forEach(doc => {
                const row = document.createElement('tr');
                row.innerHTML = `
               <td>${doc.id}</td>
               <td>${doc.name}</td>
               <td>${new Date(doc.dateUploaded).toLocaleString()}</td>
               <td>
                   <div class="btn-group" role="group">
                       <button class="btn btn-info btn-sm" onclick="showMetadata(${doc.id})">Info</button>
                       <a class="btn btn-primary btn-sm" href="${apiBaseUrl}/${doc.id}/content" target="_blank">View</a>
                       <button class="btn btn-danger btn-sm" onclick="deleteDocument(${doc.id})">Delete</button>
                   </div>
               </td>
           `;
                tableBody.appendChild(row);
            });
        } catch (error) {
            console.error('Error loading documents:', error);
            showAlert('Failed to load documents', 'danger');
        }
    }

    async function deleteDocument(id) {
        if (!confirm('Are you sure you want to delete this document?')) return;

        try {
            const response = await fetch(`${apiBaseUrl}/${id}`, {
                method: 'DELETE'
            });

            if (response.status === 204) {
                await loadDocuments();
                showAlert('Document deleted successfully', 'success');
            } else if (response.status === 499) {
                showAlert('Request was canceled', 'warning');
            } else {
                const error = await response.text();
                throw new Error(error || 'Delete failed');
            }
        } catch (error) {
            console.error('Error deleting document:', error);
            showAlert('Failed to delete document', 'danger');
        }
    }

    async function showMetadata(id) {
        try {
            const response = await fetch(`${apiBaseUrl}/${id}/metadata`);
            if (!response.ok) throw new Error('Network response was not ok');
            const metadata = await response.json();

            const modalHTML = `
           <div class="modal fade" id="metadataModal" tabindex="-1">
               <div class="modal-dialog">
                   <div class="modal-content">
                       <div class="modal-header">
                           <h5 class="modal-title">Document Details</h5>
                           <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                       </div>
                       <div class="modal-body">
                           <dl class="row">
                               <dt class="col-sm-4">ID</dt>
                               <dd class="col-sm-8">${metadata.id}</dd>
                               <dt class="col-sm-4">Name</dt>
                               <dd class="col-sm-8">${metadata.name}</dd>
                               <dt class="col-sm-4">File Path</dt>
                               <dd class="col-sm-8">${metadata.filePath}</dd>
                               <dt class="col-sm-4">File Size</dt>
                               <dd class="col-sm-8">${formatFileSize(metadata.fileSize)}</dd>
                               <dt class="col-sm-4">Upload Date</dt>
                               <dd class="col-sm-8">${new Date(metadata.dateUploaded).toLocaleString()}</dd>
                           </dl>
                       </div>
                   </div>
               </div>
           </div>`;

            document.body.insertAdjacentHTML('beforeend', modalHTML);
            const modal = new bootstrap.Modal(document.getElementById('metadataModal'));
            modal.show();

            document.getElementById('metadataModal').addEventListener('hidden.bs.modal', function() {
                this.remove();
            });
        } catch (error) {
            console.error('Error loading metadata:', error);
            showAlert('Failed to load metadata', 'danger');
        }
    }

    function showAlert(message, type) {
        const alertHTML = `
       <div class="alert alert-${type} alert-dismissible fade show" role="alert">
           ${message}
           <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
       </div>`;
        document.getElementById('alertContainer').insertAdjacentHTML('afterbegin', alertHTML);

        setTimeout(() => {
            const alert = document.querySelector('.alert');
            if (alert) {
                bootstrap.Alert.getOrCreateInstance(alert).close();
            }
        }, 3000);
    }

    function formatFileSize(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    document.addEventListener('DOMContentLoaded', loadDocuments);
</script>
</body>
</html>
